<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice &amp; Dares — Legal</title>
  <style>
    :root {
      --bg: #0e0b1a;
      --card: #171231;
      --text: #e9e6f5;
      --muted: #a89fcf;
      --accent1: #ff36c0;
      --accent2: #2bd4ff;
      --border: #2a2350;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #241a4d 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      max-width: 560px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 0 60px rgba(255, 54, 192, 0.12), 0 0 80px rgba(43, 212, 255, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.sub { color: var(--muted); margin: 0 0 28px; }
    .links { display: flex; flex-direction: column; gap: 14px; }
    a.btn {
      display: block;
      text-decoration: none;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 12px;
      font-weight: 600;
      transition: transform .12s ease, border-color .12s ease;
    }
    a.btn:hover { transform: translateY(-2px); border-color: var(--accent2); }
    footer { margin-top: 28px; color: var(--muted); font-size: .85rem; }
    footer a { color: var(--accent2); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Dice &amp; Dares</h1>
    <p class="sub">Legal &amp; Privacy</p>
    <nav class="links">
      <a class="btn" href="privacy-policy.html">Privacy Policy</a>
      <a class="btn" href="terms-of-service.html">Terms of Service</a>
    </nav>
    <footer>
      Questions? <a href="mailto:asimsafeer75@gmail.com">asimsafeer75@gmail.com</a>
    </footer>
  </main>
</body>
</html>
